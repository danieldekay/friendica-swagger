        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                photo_id:
                  type: string
                  description: id of the photo to be deleted
              required:
                - photo_id
      responses:
        '200':
          description: Photo deleted successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    example: deleted
                  message:
                    type: string
