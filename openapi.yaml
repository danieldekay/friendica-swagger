                    name:
                      type: string
                      description: name of the group
                    gid:
                      type: integer
                      description: id of the group
                    user:
                      type: array
                      items:
                        $ref: '#/components/schemas/Contact'
            application/xml:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    gid:
                      type: integer
                    user:
                      type: array
                      items:
                        $ref: '#/components/schemas/Contact'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
  /friendica/group_create:
    post:
      summary: Create the group with the posted array of contacts as members.
