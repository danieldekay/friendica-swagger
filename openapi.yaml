openapi: 3.0.0
info:
  title: Friendica API
  version: '1.0.0'
  description: OpenAPI specification for the Friendica API.
servers:
  - url: https://{host}/api
    variables:
      host:
        default: demo.friendi.ca
        description: Your Friendica server host
components:
  schemas: # Existing schemas from the file
    Activities:
      type: object
      properties:
        like:
          type: array
          items:
            $ref: '#/components/schemas/Contact'
        dislike:
          type: array
          items:
            $ref: '#/components/schemas/Contact'
        attendyes:
          type: array
          items:
            $ref: '#/components/schemas/Contact'
        attendno:
          type: array
          items:
            $ref: '#/components/schemas/Contact'
        attendmaybe:
          type: array
          items:
            $ref: '#/components/schemas/Contact'
    Attachment:
      type: object
      properties:
        url:
          type: string
          format: url
        mimetype:
          type: string
        size:
          type: integer
          format: int64
          description: File size in bytes
    Contact:
      type: object
      properties:
        id:
          type: integer
        id_str:
          type: string
        name:
          type: string
        screen_name:
          type: string
        location:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        profile_image_url:
          type: string
          format: url
        profile_image_url_https:
          type: string
          format: url
        profile_image_url_profile_size:
          type: string
          format: url
        profile_image_url_large:
          type: string
          format: url
        url:
          type: string
          format: url
          nullable: true
        protected:
          type: boolean
        followers_count:
          type: integer
        friends_count:
          type: integer
        listed_count:
          type: integer
        favourites_count:
          type: integer
        statuses_count:
          type: integer
        created_at:
          type: string
          format: date-time
          example: 'Wed May 23 06:01:13 +0000 2007'
        utc_offset:
          type: integer
          nullable: true
        time_zone:
          type: string
          nullable: true
        geo_enabled:
          type: boolean
        verified:
          type: boolean
        lang:
          type: string
          nullable: true
        contributors_enabled:
          type: boolean
        is_translator:
          type: boolean
        is_translation_enabled:
          type: boolean
        following:
          type: boolean
        follow_request_sent:
          type: boolean
        statusnet_blocking:
          type: boolean
          nullable: true
        notifications:
          type: boolean
          nullable: true
        statusnet_profile_url:
          type: string
          format: url
        uid:
          type: integer
        cid:
          type: integer
        pid:
          type: integer
        self:
          type: integer
        network:
          type: string
    Entities:
      type: object
      properties:
        hashtags:
          type: array
          items:
            $ref: '#/components/schemas/Hashtag'
        symbols:
          type: array
          items:
            $ref: '#/components/schemas/Symbol'
        urls:
          type: array
          items:
            $ref: '#/components/schemas/URL'
        user_mentions:
          type: array
          items:
            $ref: '#/components/schemas/UserMention'
        media:
          type: array
          items:
            $ref: '#/components/schemas/Media'
    Event:
      type: object
      properties:
        id:
          type: integer
        uid:
          type: integer
          description: Owner User Id
        cid:
          type: integer
          description: Target Contact Id
        uri:
          type: string
          description: Item unique URI string
        name:
          type: string
          description: Title (Plaintext)
        desc:
          type: string
          description: Description (HTML)
        startTime:
          type: string
          format: date-time
          description: UTC YYYY-MM-DD HH:II:SS
        endTime:
          type: string
          format: date-time
          description: 'Optional (null date is 0001-01-01 00:00:00)'
          nullable: true
        type:
          type: string
          description: event or birthday
        nofinish:
          type: boolean
          description: Ongoing event
        place:
          type: string
          description: Optional. Location.
          nullable: true
        ignore:
          type: boolean
          description: '???'
        allow_cid:
          type: string
          description: 'Optional. List of allowed contact ids (angle-brackets escaped integers)'
          nullable: true
        allow_gid:
          type: string
          description: 'Optional. List of allowed group ids (angle-brackets escaped integers)'
          nullable: true
        deny_cid:
          type: string
          description: 'Optional. List of disallowed contact ids (angle-brackets escaped integers)'
          nullable: true
        deny_gid:
          type: string
          description: 'Optional. List of disallowed group ids (angle-brackets escaped integers)'
          nullable: true
    Hashtag:
      type: object
      properties:
        text:
          type: string
        indices:
          type: array
          items:
            type: integer
    Item:
      type: object
      properties:
        text:
          type: string
          description: Plaintext
        truncated:
          type: boolean
        created_at:
          type: string
          format: date-time
          example: 'Wed May 23 06:01:13 +0000 2007'
        in_reply_to_status_id:
          type: integer
          nullable: true
        in_reply_to_status_id_str:
          type: string
          nullable: true
        source:
          type: string
        id:
          type: integer
        id_str:
          type: string
        in_reply_to_user_id:
          type: integer
          nullable: true
        in_reply_to_user_id_str:
          type: string
          nullable: true
        in_reply_to_screen_name:
          type: string
          nullable: true
        geo:
          type: string
          nullable: true
        favorited:
          type: boolean
        user:
          $ref: '#/components/schemas/Contact'
        friendica_author:
          $ref: '#/components/schemas/Contact'
        friendica_owner:
          $ref: '#/components/schemas/Contact'
        friendica_private:
          type: boolean
        statusnet_html:
          type: string
          description: HTML content
        statusnet_conversation_id:
          type: integer
          nullable: true
        external_url:
          type: string
          format: url
          nullable: true
        friendica_activities:
          $ref: '#/components/schemas/Activities'
        friendica_title:
          type: string
          description: Plaintext
          nullable: true
        friendica_html:
          type: string
          description: HTML content
          nullable: true
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/Attachment'
          nullable: true
        entities:
          $ref: '#/components/schemas/Entities'
          nullable: true
    Media:
      type: object
      properties:
        id:
          type: integer
        id_str:
          type: string
        indices:
          type: array
          items:
            type: integer
        media_url:
          type: string
          format: url
        media_url_https:
          type: string
          format: url
        url:
          type: string
          format: url
        display_url:
          type: string
          format: url
        expanded_url:
          type: string
          format: url
        ext_alt_text:
          type: string
          nullable: true
        type:
          type: string
        sizes:
          $ref: '#/components/schemas/Sizes'
    Notification:
      type: object
      properties:
        id:
          type: integer
        hash:
          type: string
        type:
          type: integer
          description: |
            Notification type:
            1: Inbound follow request
            2: Outbound follow request confirmation
            4: Wall-to-wall post
            8: Reply
            16: Private message
            32: Friend suggestion
            64: Unused
            128: Mention
            256: Tag added to a post
            512: Poke
            1024: New post
            16384: System email
            32768: System event
        name:
          type: string
          description: Full name of the contact subject
        url:
          type: string
          format: url
          description: Profile page URL of the contact subject
        photo:
          type: string
          format: url
          description: Profile photo URL of the contact subject
        date:
          type: string
          format: date-time
          description: YYYY-MM-DD hh:mm:ss local server time
        msg:
          type: string
          description: BBCode
        uid:
          type: integer
          description: Owner User Id
        link:
          type: string
          format: url
          description: Notification URL
        iid:
          type: integer
          description: Item Id
          nullable: true
        parent:
          type: integer
          description: Parent Item Id
          nullable: true
        seen:
          type: boolean
          description: Whether the notification was read or not.
        verb:
          type: string
          format: url
          description: Activity Streams Verb URL
          nullable: true
        otype:
          type: string
          enum: [item, intro, mail]
          description: Subject type
        name_cache:
          type: string
          description: Full name of the contact subject (HTML)
          nullable: true
        msg_cache:
          type: string
          description: Plaintext version of the notification text with a placeholder ({0}) for the subject contact’s name.
          nullable: true
        timestamp:
          type: integer
          format: int64
        date_rel:
          type: string
          description: Time since the note was posted, eg “1 hour ago”
        msg_html:
          type: string
          description: HTML
          nullable: true
        msg_plain:
          type: string
          description: Plaintext
          nullable: true
    Photo:
      type: object
      properties:
        id:
          type: string
          description: Resource ID (32 hex chars)
        created:
          type: string
          format: date-time
        edited:
          type: string
          format: date-time
        title:
          type: string
          nullable: true
        desc:
          type: string
          description: Picture caption (Plaintext)
          nullable: true
        album:
          type: string
          description: Album name
        filename:
          type: string
          description: Original image filename
        type:
          type: string
          description: MIME Type
        height:
          type: integer
          description: Image height in pixels
        width:
          type: integer
          description: Image width in pixels
        profile:
          type: integer
          description: 1 if is profile photo
        allow_cid:
          type: string
          description: List of contact ids wrapped in angle brackets allowed to access the photo (ACL).
          nullable: true
        allow_gid:
          type: string
          description: List of contact group ids wrapped in angle brackets allowed to access the photo (ACL).
          nullable: true
        deny_cid:
          type: string
          description: List of contact ids wrapped in angle brackets forbidden to access the photo (ACL).
          nullable: true
        deny_gid:
          type: string
          description: List of contact group ids wrapped in angle brackets forbidden to access the photo (ACL).
          nullable: true
        link:
          type: object
          additionalProperties:
            type: string
            format: url
          description: URLs to the different scales indexed by scale number if no specific scale was requested. Mutually exclusive with data/datasize.
          nullable: true
        datasize:
          type: integer
          description: Picture size in bytes if a single scale was requested. Mutually exclusive with link.
          nullable: true
        data:
          type: string
          format: byte
          description: Base64-encoded image data if a single scale was requested. Mutually exclusive with link.
          nullable: true
        friendica_activities:
          $ref: '#/components/schemas/Activities'
          nullable: true
        friendica_comments:
          type: array
          items:
            $ref: '#/components/schemas/Item'
          nullable: true
        rights_mismatch:
          type: boolean
          description: True if the ACL differs between the picture and the associated item.
          nullable: true
    PhotoListItem:
      type: object
      properties:
        id:
          type: string
          description: Resource ID (32 hex chars)
        album:
          type: string
          description: Album name
        filename:
          type: string
          description: Original image filename
        type:
          type: string
          description: MIME Type
        created:
          type: string
          format: date-time
        edited:
          type: string
          format: date-time
        desc:
          type: string
          description: Picture caption (Plaintext)
          nullable: true
        thumb:
          type: string
          format: url
          description: URL of the smallest scale version of the picture.
    PrivateMessage:
      type: object
      properties:
        id:
          type: integer
        sender_id:
          type: integer
          description: Sender Contact Id
        text:
          type: string
          description: Can be HTML or plaintext depending on the API call parameter getText.
        recipient_id:
          type: integer
          description: Recipient Contact Id
        created_at:
          type: string
          format: date-time
          example: 'Wed May 23 06:01:13 +0000 2007'
        sender_screen_name:
          type: string
        recipient_screen_name:
          type: string
        sender:
          $ref: '#/components/schemas/Contact'
        recipient:
          $ref: '#/components/schemas/Contact'
        title:
          type: string
          description: Empty if the API call parameter getText is empty or absent.
          nullable: true
        friendica_seen:
          type: boolean
          description: Whether the private message has been read or not.
        friendica_parent_uri:
          type: string
          nullable: true
    Profile:
      type: object
      properties:
        profile_id:
          type: integer
        profile_name:
          type: string
        is_default:
          type: boolean
        hide_friends:
          type: boolean
          description: Whether the user chose to hide their contact list on their profile.
        profile_photo:
          type: string
          format: url
          description: Largest size profile picture URL.
        profile_thumb:
          type: string
          format: url
          description: Smallest size profile picture URL.
        publish:
          type: boolean
          description: Whether the user chose to publish their profile in the local directory.
        net_publish:
          type: boolean
          description: Whether the user chose to publish their profile in the global directory.
        description:
          type: string
          nullable: true
        date_of_birth:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        region:
          type: string
          nullable: true
        postal_code:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        public_keywords:
          type: string
          description: Comma-separated list of words meant to be displayed as hashtags.
          nullable: true
        private_keywords:
          type: string
          description: Comma-separated list of words meant to be used for search only.
          nullable: true
        homepage:
          type: string
          format: url
          nullable: true
    Size:
      type: object
      properties:
        w:
          type: integer
        h:
          type: integer
        resize:
          type: string
          enum: [fit, crop]
          nullable: true
    Sizes:
      type: object
      properties:
        medium:
          $ref: '#/components/schemas/Size'
        large:
          $ref: '#/components/schemas/Size'
          nullable: true
        thumb:
          $ref: '#/components/schemas/Size'
          nullable: true
        small:
          $ref: '#/components/schemas/Size'
          nullable: true
    Symbol:
      type: object
      properties:
        text:
          type: string
        indices:
          type: array
          items:
            type: integer
    URL:
      type: object
      properties:
        url:
          type: string
          format: url
        expanded_url:
          type: string
          format: url
          nullable: true
        display_url:
          type: string
          format: url
          nullable: true
        indices:
          type: array
          items:
            type: integer
    UserMention:
      type: object
      properties:
        id:
          type: integer
        id_str:
          type: string
        name:
          type: string
        screen_name:
          type: string
        indices:
          type: array
          items:
            type: integer
    Error: # Generic Error schema for Friendica API
      type: object
      properties:
        error:
          type: string
          description: Specific error message
        request:
          type: string
          description: API path requested
        code:
          type: integer
          description: HTTP error code
      xml:
        name: status
    # Start of new schemas to be appended
    TwitterList: # Based on standard Twitter List object
      type: object
      properties:
        id:
          type: integer
          format: int64
        id_str:
          type: string
        name:
          type: string
        uri:
          type: string
        subscriber_count:
          type: integer
        member_count:
          type: integer
        mode:
          type: string
          enum: [public, private]
        description:
          type: string
          nullable: true
        slug:
          type: string
        full_name:
          type: string
        created_at:
          type: string
          format: date-time
        following:
          type: boolean
        user:
          $ref: '#/components/schemas/Contact'
    MastodonAccount:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        acct:
          type: string
        url:
          type: string
          format: url
        display_name:
          type: string
        note:
          type: string
        avatar:
          type: string
          format: url
        avatar_static:
          type: string
          format: url
        header:
          type: string
          format: url
        header_static:
          type: string
          format: url
        locked:
          type: boolean
        fields:
          type: array
          items:
            $ref: '#/components/schemas/MastodonField'
        emojis:
          type: array
          items:
            $ref: '#/components/schemas/MastodonCustomEmoji'
        bot:
          type: boolean
          default: false
        group:
          type: boolean
          default: false
        discoverable:
          type: boolean
          nullable: true
        noindex:
          type: boolean
          nullable: true
        moved:
          $ref: '#/components/schemas/MastodonAccount'
          nullable: true
        suspended:
          type: boolean
          nullable: true
        limited:
          type: boolean
          nullable: true
        created_at:
          type: string
          format: date-time
        last_status_at:
          type: string
          format: date
          nullable: true
        statuses_count:
          type: integer
        followers_count:
          type: integer
        following_count:
          type: integer
      required:
        - id
        - username
        - acct
        - url
        - display_name
        - note
        - avatar
        - avatar_static
        - header
        - header_static
        - locked
        - fields
        - emojis
        - created_at
        - statuses_count
        - followers_count
        - following_count
    MastodonField:
      type: object
      properties:
        name:
          type: string
        value:
          type: string
        verified_at:
          type: string
          format: date-time
          nullable: true
      required:
        - name
        - value
    MastodonCustomEmoji:
      type: object
      properties:
        shortcode:
          type: string
        url:
          type: string
          format: url
        static_url:
          type: string
          format: url
        visible_in_picker:
          type: boolean
        category:
          type: string
          nullable: true
      required:
        - shortcode
        - url
        - static_url
        - visible_in_picker
    MastodonApplication:
      type: object
      properties:
        name:
          type: string
        website:
          type: string
          format: url
          nullable: true
        vapid_key:
          type: string
          nullable: true
        client_id:
          type: string
          nullable: true
        client_secret:
          type: string
          nullable: true
      required:
        - name
    MastodonMention:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        url:
          type: string
          format: url
        acct:
          type: string
      required:
        - id
        - username
        - url
        - acct
    MastodonTag:
      type: object
      properties:
        name:
          type: string
        url:
          type: string
          format: url
        history:
          type: array
          items:
            $ref: '#/components/schemas/MastodonTagHistory'
          nullable: true
        following:
          type: boolean
          nullable: true
      required:
        - name
        - url
    MastodonTagHistory:
      type: object
      properties:
        day:
          type: string
        uses:
          type: string
        accounts:
          type: string
      required:
        - day
        - uses
        - accounts
    MastodonStatus:
      type: object
      properties:
        id:
          type: string
        uri:
          type: string
        created_at:
          type: string
          format: date-time
        account:
          $ref: '#/components/schemas/MastodonAccount'
        content:
          type: string
        visibility:
          type: string
          enum: [public, unlisted, private, direct]
        sensitive:
          type: boolean
        spoiler_text:
          type: string
        media_attachments:
          type: array
          items:
            $ref: '#/components/schemas/MastodonAttachment'
        application:
          $ref: '#/components/schemas/MastodonApplication'
          nullable: true
        mentions:
          type: array
          items:
            $ref: '#/components/schemas/MastodonMention'
        tags:
          type: array
          items:
            $ref: '#/components/schemas/MastodonTag'
        emojis:
          type: array
          items:
            $ref: '#/components/schemas/MastodonCustomEmoji'
        reblogs_count:
          type: integer
        favourites_count:
          type: integer
        replies_count:
          type: integer
        url:
          type: string
          format: url
          nullable: true
        in_reply_to_id:
          type: string
          nullable: true
        in_reply_to_account_id:
          type: string
          nullable: true
        reblog:
          $ref: '#/components/schemas/MastodonStatus'
          nullable: true
        poll:
          $ref: '#/components/schemas/MastodonPoll'
          nullable: true
        card:
          $ref: '#/components/schemas/MastodonCard'
          nullable: true
        language:
          type: string
          nullable: true
        text:
          type: string
          nullable: true
        edited_at:
          type: string
          format: date-time
          nullable: true
        favourited:
          type: boolean
          nullable: true
        reblogged:
          type: boolean
          nullable: true
        muted:
          type: boolean
          nullable: true
        bookmarked:
          type: boolean
          nullable: true
        pinned:
          type: boolean
          nullable: true
        filtered:
          type: array
          items:
            type: object # Placeholder for FilterResult
          nullable: true
      required:
        - id
        - uri
        - created_at
        - account
        - content
        - visibility
        - sensitive
        - spoiler_text
        - media_attachments
        - mentions
        - tags
        - emojis
        - reblogs_count
        - favourites_count
        - replies_count
    MastodonAttachment:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [image, gifv, video, audio, unknown]
        url:
          type: string
          format: url
        preview_url:
          type: string
          format: url
        remote_url:
          type: string
          format: url
          nullable: true
        meta:
          type: object
          properties:
            original:
              type: object
              properties:
                width:
                  type: integer
                height:
                  type: integer
                size:
                  type: string
                aspect:
                  type: number
                  format: double
            small:
              type: object
              properties:
                width:
                  type: integer
                height:
                  type: integer
                size:
                  type: string
                aspect:
                  type: number
                  format: double
            focus:
              type: object
              properties:
                x:
                  type: number
                  format: float
                y:
                  type: number
                  format: float
            length:
              type: string
            duration:
              type: number
              format: float
            fps:
              type: integer
            audio_encode:
              type: string
            audio_bitrate:
              type: string
            audio_channels:
              type: string
        description:
          type: string
          nullable: true
        blurhash:
          type: string
          nullable: true
      required:
        - id
        - type
        - url
        - preview_url
    MastodonCard:
      type: object
      properties:
        url:
          type: string
          format: url
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [link, photo, video, rich]
        author_name:
          type: string
          nullable: true
        author_url:
          type: string
          format: url
          nullable: true
        provider_name:
          type: string
          nullable: true
        provider_url:
          type: string
          format: url
          nullable: true
        html:
          type: string
          nullable: true
        width:
          type: integer
          nullable: true
        height:
          type: integer
          nullable: true
        image:
          type: string
          format: url
          nullable: true
        embed_url:
          type: string
          format: url
          nullable: true
        blurhash:
          type: string
          nullable: true
      required:
        - url
        - title
        - description
        - type
    MastodonPoll:
      type: object
      properties:
        id:
          type: string
        expires_at:
          type: string
          format: date-time
          nullable: true
        expired:
          type: boolean
        multiple:
          type: boolean
        votes_count:
          type: integer
        voters_count:
          type: integer
          nullable: true
        options:
          type: array
          items:
            $ref: '#/components/schemas/MastodonPollOption'
        emojis:
          type: array
          items:
            $ref: '#/components/schemas/MastodonCustomEmoji'
        voted:
          type: boolean
          nullable: true
        own_votes:
          type: array
          items:
            type: integer
          nullable: true
      required:
        - id
        - expired
        - multiple
        - votes_count
        - options
        - emojis
    MastodonPollOption:
      type: object
      properties:
        title:
          type: string
        votes_count:
          type: integer
          nullable: true
      required:
        - title
  # New top-level component sections
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: HTTP Basic Authentication
    oauth1:
      type: oauth2
      description: |
        Friendica uses OAuth 1.0a for authentication.
        This definition is a placeholder as OpenAPI 3.0 lacks direct OAuth 1.0a support.
        Refer to Friendica OAuth 1.0a documentation for implementation details:
        https://wiki.friendi.ca/docs/api-authentication#oauth-1-0a
      flows:
        implicit: # Placeholder flow
          authorizationUrl: https://{host}/oauth/authorize # Actual URL might differ
          scopes: {}
  responses:
    BadRequest:
      description: Bad Request - parameters are missing or items can't be found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
        application/xml:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Forbidden - authenticated user is missing or lacks permission
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
        application/xml:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not Found - the requested resource does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
        application/xml:
          schema:
            $ref: '#/components/schemas/Error'
    MethodNotAllowed:
      description: Method Not Allowed - API was called with an invalid method
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
        application/xml:
          schema:
            $ref: '#/components/schemas/Error'
    InternalServerError:
      description: Internal Server Error - other error conditions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
        application/xml:
          schema:
            $ref: '#/components/schemas/Error'

