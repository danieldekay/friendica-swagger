                  description: name of the group to be deleted (must match)
              required:
                - gid
                - name
      responses:
        '200':
          description: Group deletion status.
          content:
            application/json:
              schema:
                type: object # Docs say "Array of:", but properties suggest a single object response
                properties:
                  success:
                    type: boolean
                  gid:
                    type: integer
                  name:
                    type: string
                  status:
                    type: string
                    example: deleted
                  wrong_users: # "empty array"
                    type: array
                    items: {} # Empty array
            application/xml: {} # Define if XML structure is known
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
