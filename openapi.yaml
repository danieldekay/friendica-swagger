  /friendica/direct_messages_search:
    get:
      summary: Returns Private Messages matching the provided search string.
      operationId: getFriendicaDirectMessagesSearch
      tags:
        - friendica-api
        - direct-messages
      security:
        - basicAuth: []
        - oauth1: []
      parameters:
        - name: searchstring
          in: query
          description: string for which the API call should search as '%searchstring%' in field 'body'
          required: true
          schema:
            type: string
        - name: getText
          in: query
          description: 'Optional. plain|html. If ommited, the title is prepended to the plaintext body in the text attribute.'
          required: false
          schema:
            type: string
            enum: [plain, html]
        - name: getUserObjects
          in: query
          description: 'Optional. true|false. If false, sender and recipient attributes are absent.'
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  search_results:
                    oneOf:
                      - type: array
                        items:
                          $ref: '#/components/schemas/PrivateMessage'
                      - type: string
                        example: nothing found
            application/xml: {}
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
  /friendica/group_show:
