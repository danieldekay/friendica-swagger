    post:
      summary: Add or remove an activity from an item.
      operationId: postFriendicaActivity
      tags:
        - friendica-api
      security:
        - basicAuth: []
        - oauth1: []
      parameters:
        - name: verb
          in: path
          required: true
          description: |
            Activity verb. Can be one of:
            - like
            - dislike
            - attendyes
            - attendno
            - attendmaybe
            To remove an activity, prepend the verb with "un", e.g., "unlike".
          schema:
            type: string
            enum:
              - like
              - dislike
              - attendyes
              - attendno
              - attendmaybe
              - unlike
              - undislike
              - unattendyes # Assuming these are valid for removal
              - unattendno
              - unattendmaybe
        - name: id
          in: query # Docs say "Parameters: id: item id", assuming query param
          description: item id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Activity successfully applied or removed.
          content:
            application/json:
              schema:
                type: string # "ok"
                example: "ok"
            application/xml:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
