  /oauth/access_token:
    post:
      summary: Obtain an access token (Twitter API compatible).
      operationId: postOauthAccessToken
      tags:
        - twitter-api
        - oauth
      # No explicit security for this endpoint itself, it's part of OAuth flow.
      # Parameters are typically x_auth_*, but Friendica docs say these are unsupported.
      # This implies Friendica might handle it differently or expects standard OAuth1 params.
      # For now, defining without specific parameters beyond what OAuth1 implies.
      requestBody:
        description: OAuth parameters for obtaining an access token.
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                oauth_verifier: # Example, actual params depend on OAuth flow stage
                  type: string
                # Other OAuth parameters as needed by the flow
      responses:
        '200':
          description: Access token obtained successfully.
          content:
            application/x-www-form-urlencoded: # Twitter typically returns this format
              schema:
                type: object
                properties:
                  oauth_token:
                    type: string
                  oauth_token_secret:
                    type: string
                  user_id: # Example additional fields
                    type: string
                  screen_name:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401': # Unauthorized
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
            application/xml:
              schema:
                $ref: '#/components/schemas/Error'
  /oauth/request_token:
    post:
      summary: Obtain a request token (Twitter API compatible).
      operationId: postOauthRequestToken
      tags:
        - twitter-api
        - oauth
      requestBody:
        description: OAuth parameters for obtaining a request token.
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                oauth_callback:
                  type: string
                  format: url
                # x_auth_access_type is unsupported by Friendica
      responses:
        '200':
          description: Request token obtained successfully.
          content:
            application/x-www-form-urlencoded:
              schema:
                type: object
                properties:
                  oauth_token:
                    type: string
                  oauth_token_secret:
                    type: string
                  oauth_callback_confirmed:
                    type: boolean # Should be "true"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
            application/xml:
              schema:
                $ref: '#/components/schemas/Error'
  /account/verify_credentials:
    get:
      summary: Returns an HTTP 200 OK response code and a representation of the requesting user if authentication was successful.
      operationId: getAccountVerifyCredentials
      tags:
        - twitter-api
        - account
      security:
        - basicAuth: []
        - oauth1: []
      parameters:
        - name: include_entities # Supported by Twitter, but Friendica default is false
          in: query
          description: The entities node will not be included when set to false. (Friendica default: false)
          required: false
          schema:
            type: boolean
            default: false
        # include_email is unsupported by Friendica
      responses:
        '200':
          description: Authenticated user details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact' # Friendica uses its Contact entity
            application/xml:
              schema:
                $ref: '#/components/schemas/Contact'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
            application/xml:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          $ref: '#/components/responses/Forbidden'
  /account/update_profile:
    post:
      summary: Sets values that users are able to set under the "Account" tab of their settings page.
      operationId: postAccountUpdateProfile
      tags:
        - twitter-api
        - account
      security:
        - basicAuth: []
        - oauth1: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Full name associated with the profile. Maximum of 50 characters.
                  maxLength: 50
                # url is unsupported
                # location is unsupported
                description:
                  type: string
                  description: Description of the user. Maximum of 160 characters.
                  maxLength: 160
                # profile_link_color is unsupported
                # include_entities is unsupported for this POST
                # skip_status is unsupported
      responses:
        '200':
          description: Profile updated successfully. Returns the updated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
            application/xml:
              schema:
                $ref: '#/components/schemas/Contact'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Unauthorized
        '403':
          $ref: '#/components/responses/Forbidden'
  /account/update_profile_image:
    post:
      summary: Updates the authenticating user’s profile image.
      operationId: postAccountUpdateProfileImage
      tags:
        - twitter-api
        - account
      security:
        - basicAuth: []
        - oauth1: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary # base64 encoded string or binary file
                  description: The avatar image for the profile. Must be a valid GIF, JPG, or PNG image of less than 700 kilobytes in size. Images with width larger than 400 pixels will be scaled down. Animated GIFs will be converted to a static GIF of the first frame, removing the animation.
                profile_id: # Friendica-specific additional parameter
                  type: integer
                  description: (optional) Numerical id of the profile for which the image should be used, default is changing the default profile.
              required:
                - image
      responses:
        '200':
          description: Profile image updated successfully. Returns the updated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
            application/xml:
              schema:
                $ref: '#/components/schemas/Contact'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Unauthorized
        '403':
          $ref: '#/components/responses/Forbidden'
