  /friendica/photo/create:
    post:
      summary: Alias of POST /friendica/photo/update (for creating a new photo).
      operationId: postFriendicaPhotoCreate
      tags:
        - friendica-api
        - photos
      security:
        - basicAuth: []
        - oauth1: []
      requestBody:
        description: Photo to create. See /friendica/photo/update for details.
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                media:
                  type: string
                  format: binary
                  description: Image data.
                desc:
                  type: string
                  description: (optional) description for the photo
                album:
                  type: string
                  description: name of the album to be created or used
                allow_cid:
                  type: string
                  description: '<x><y><z> for private photo'
                allow_gid:
                  type: string
                deny_cid:
                  type: string
                deny_gid:
                  type: string
              required:
                - media
                - album
      responses:
        '200':
          description: Photo created/updated successfully. See /friendica/photo/update for response details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Photo'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /friendica/photo/update:
    post:
      summary: Saves/updates data for a photo.
      operationId: postFriendicaPhotoUpdate
      tags:
        - friendica-api
        - photos
      security:
        - basicAuth: []
        - oauth1: []
      requestBody:
        description: Photo data to update.
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                photo_id:
                  type: string
                  description: (optional) if specified the photo with this id will be updated
                media:
                  type: string
                  format: binary
                  description: (optional) image data, only optional if photo_id is specified
                desc:
                  type: string
                  description: (optional) description for the photo
                album:
                  type: string
                  description: name of the album
                album_new:
                  type: string
                  description: (optional) can be used to change the album of a single photo if photo_id is specified
                allow_cid:
                  type: string
                allow_gid:
                  type: string
                deny_cid:
                  type: string
                deny_gid:
                  type: string
              required:
                - album
      responses:
        '200':
          description: Photo updated successfully. Response varies.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Photo'
                  - type: object
                    properties:
                      result:
                        type: string
                        example: updated
                      message:
                        type: string
                  - type: object
                    properties:
                      result:
                        type: string
                        example: cancelled
                      message:
                        type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /friendica/photo/delete:
