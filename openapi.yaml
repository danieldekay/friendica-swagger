        - basicAuth: []
        - oauth1: []
      parameters:
        - name: name
          in: query
          description: name of the group to be created
          required: true
          schema:
            type: string
      requestBody:
        description: JSON data for the group to be created.
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                gid:
                  type: integer
                  nullable: true
                name:
                  type: string
                contacts:
                  type: array
                  items:
                    $ref: '#/components/schemas/Contact'
      responses:
        '200':
          description: Group creation status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
